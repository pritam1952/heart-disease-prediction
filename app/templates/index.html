<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="card">
    <div class="header">
        <div class="icon">❤️</div>
        <h1>Heart Disease Predictor</h1>
        <p>Enter patient details to predict heart disease risk</p>
    </div>

    <form action="/predict" method="POST">

        <div class="section-title">Personal Info</div>
        <div class="grid">
            <div class="form-group">
                <label>Age (years)</label>
                <input type="number" name="age" min="20" max="100" placeholder="e.g. 52" required>
            </div>
            <div class="form-group">
                <label>Sex</label>
                <select name="sex" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>
        </div>

        <div class="section-title">Symptoms</div>
        <div class="grid">
            <div class="form-group">
                <label>Chest Pain Type</label>
                <select name="cp" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">Typical Angina</option>
                    <option value="1">Atypical Angina</option>
                    <option value="2">Non-Anginal Pain</option>
                    <option value="3">Asymptomatic</option>
                </select>
            </div>
            <div class="form-group">
                <label>Exercise Induced Angina</label>
                <select name="exang" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
        </div>

        <div class="section-title">Blood Tests</div>
        <div class="grid">
            <div class="form-group">
                <label>Resting Blood Pressure (mm Hg)</label>
                <input type="number" name="trestbps" min="80" max="220" placeholder="e.g. 130" required>
            </div>
            <div class="form-group">
                <label>Cholesterol (mg/dl)</label>
                <input type="number" name="chol" min="100" max="600" placeholder="e.g. 250" required>
            </div>
            <div class="form-group">
                <label>Fasting Blood Sugar</label>
                <select name="fbs" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Greater than 120 mg/dl</option>
                    <option value="0">Less than 120 mg/dl</option>
                </select>
            </div>
            <div class="form-group">
                <label>Max Heart Rate Achieved</label>
                <input type="number" name="thalach" min="60" max="220" placeholder="e.g. 150" required>
            </div>
        </div>

        <div class="section-title">ECG & Advanced Tests</div>
        <div class="grid">
            <div class="form-group">
                <label>Resting ECG Result</label>
                <select name="restecg" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">Normal</option>
                    <option value="1">ST-T Wave Abnormality</option>
                    <option value="2">Left Ventricular Hypertrophy</option>
                </select>
            </div>
            <div class="form-group">
                <label>ST Depression (Oldpeak)</label>
                <input type="number" name="oldpeak" min="0" max="10" step="0.1" placeholder="e.g. 1.5" required>
            </div>
            <div class="form-group">
                <label>ST Slope</label>
                <select name="slope" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">Upsloping</option>
                    <option value="1">Flat</option>
                    <option value="2">Downsloping</option>
                </select>
            </div>
            <div class="form-group">
                <label>Major Vessels (ca)</label>
                <select name="ca" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="form-group">
                <label>Thalassemia</label>
                <select name="thal" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">Normal</option>
                    <option value="1">Fixed Defect</option>
                    <option value="2">Reversible Defect</option>
                    <option value="3">Normal (variant)</option>
                </select>
            </div>
        </div>

        <button type="submit" class="submit-btn">Predict Now</button>
    </form>
</div>
</body>
</html>
